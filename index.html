<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        h1 { font-size: 3em; }
        .card {
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Test Website</h1>
        <p>This is a test website created by Grok on GitHub Pages.</p>
        <p><strong>Current time:</strong> <span id="time"></span></p>
        <button onclick="alert('Hello from your test website!')">Click Me</button>
    </div>

    <script>
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
